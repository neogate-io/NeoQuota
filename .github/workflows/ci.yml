name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 同一分支/PR 的新提交会取消正在跑的旧任务,节省额度
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: 前端校验 (type-check + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 类型检查
        run: bun run type-check

      - name: Lint
        run: bun run lint

  rust-test:
    name: Rust 测试
    # 应用只针对 macOS/Windows,在 macOS runner 上测可避免 Linux 端的 GTK/系统库依赖
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        # 版本会被仓库根目录的 rust-toolchain.toml (1.96.0) 约束
        uses: dtolnay/rust-toolchain@1.96.0

      - name: 缓存 Cargo 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 运行 Rust 测试
        run: cargo test --manifest-path src-tauri/Cargo.toml
